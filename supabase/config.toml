# Config as code para Supabase — ver:
# https://supabase.com/docs/guides/local-development/cli/config
#
# Este archivo está deliberadamente ACOTADO solo a las 6 plantillas de
# correo de Auth (`auth.email.template.*`). No declara `[auth]` general
# (site_url, redirect URLs, proveedores OAuth, SMTP, MFA, rate limits),
# `[db]`, `[api]`, `[storage]`, etc. a propósito, para minimizar lo que
# `supabase config push` puede tocar en el proyecto real.
#
# IMPORTANTE antes de correr `supabase config push`:
#   1. `supabase link --project-ref <tu-project-ref>`
#   2. El CLI muestra un diff local vs. remoto antes de aplicar nada.
#   3. Verifica que el diff solo muestre cambios en las 6 plantillas de
#      abajo. Si aparece cualquier otro cambio (site_url, proveedores,
#      SMTP, etc.), CANCELA (Ctrl+C / responde "no") — significa que el
#      proyecto remoto tiene configuración que este archivo no declara.
project_id = "zentro-med"

[auth.email.template.confirmation]
subject = "Confirma tu cuenta en Zentro Med"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Restablece tu contraseña — Zentro Med"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Tu enlace de acceso a Zentro Med"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.invite]
subject = "Te invitaron a unirte a Zentro Med"
content_path = "./supabase/templates/invite.html"

[auth.email.template.email_change]
subject = "Confirma tu nuevo correo — Zentro Med"
content_path = "./supabase/templates/email_change.html"

[auth.email.template.reauthentication]
subject = "Tu código de verificación — Zentro Med"
content_path = "./supabase/templates/reauthentication.html"
